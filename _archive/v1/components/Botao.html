<!-- @dsCard group="Components" name="Botao" subtitle="primary · secondary · ghost" viewport="520x180" -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="../_ds_bundle.js"></script>
</head>
<body>
  <div id="root" class="cdp-botao-card">
    <a class="button" href="#botao">Primary</a>
    <a class="button cdp-botao--secondary" href="#botao-secondary">Secondary</a>
    <a class="button cdp-botao--ghost" href="#botao-ghost">Ghost</a>
  </div>
  <script>
    (function mount() {
      var root = document.getElementById('root');
      var ns = Object.values(window).find(function (value) {
        return value && value.Botao;
      });

      if (!root || !ns || !ns.Botao || !window.React || !window.ReactDOM) {
        window.setTimeout(mount, 50);
        return;
      }

      var e = window.React.createElement;
      window.ReactDOM.createRoot(root).render(
        e(window.React.Fragment, null,
          e(ns.Botao, { label: 'Primary', variant: 'primary' }),
          e(ns.Botao, { label: 'Secondary', variant: 'secondary' }),
          e(ns.Botao, { label: 'Ghost', variant: 'ghost' })
        )
      );
    })();
  </script>
</body>
</html>
