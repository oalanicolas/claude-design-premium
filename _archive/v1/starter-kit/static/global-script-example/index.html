<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Canvas-Safe Global Script Example</title>
  <link rel="stylesheet" href="../tokens.css">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--cds-bg);
      color: var(--cds-text);
      font-family: var(--cds-font-sans);
    }

    .demo {
      width: min(560px, calc(100vw - 32px));
      border: 1px solid var(--cds-border);
      border-radius: var(--cds-radius-md);
      padding: var(--cds-space-6);
      background: var(--cds-surface);
    }

    .demo h1 {
      margin: 0 0 var(--cds-space-3);
      font-size: 28px;
      line-height: 1.1;
    }

    .demo p {
      margin: 0 0 var(--cds-space-4);
      color: var(--cds-muted);
    }

    .demo button {
      border: 0;
      border-radius: var(--cds-radius-sm);
      padding: var(--cds-space-3) var(--cds-space-4);
      background: var(--cds-primary);
      color: var(--cds-primary-contrast);
      font: inherit;
      cursor: pointer;
    }

    .demo output {
      display: block;
      margin-top: var(--cds-space-4);
      color: var(--cds-muted);
    }
  </style>
</head>
<body>
  <main class="demo" data-global-widget>
    <h1>Global script, no imports.</h1>
    <p>This file loads a self-contained browser script and reads its API from window.</p>
    <button type="button" data-global-widget-action>Run widget</button>
    <output data-global-widget-output>Waiting.</output>
  </main>

  <script src="./widget.js"></script>
  <script>
    window.CDPGlobalWidget.mount(document.querySelector('[data-global-widget]'));
  </script>
</body>
</html>
