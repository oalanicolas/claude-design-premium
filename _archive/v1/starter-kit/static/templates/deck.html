<!-- @template deck -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deck</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    .deck { min-height: 100vh; display: grid; place-items: center; padding: 32px; }
    .slide { width: min(1120px, 100%); aspect-ratio: 16 / 9; border: 1px solid var(--cds-border); border-radius: var(--cds-radius-md); background: var(--cds-surface); padding: 56px; display: grid; align-content: center; }
    .slide h1 { font-family: var(--cds-font-display); font-size: 76px; line-height: .96; margin: 0; letter-spacing: 0; }
    .slide p { color: var(--cds-muted); font-size: 20px; line-height: 1.5; max-width: 62ch; }
    @media (max-width: 760px) {
      .deck { padding: 16px; }
      .slide { aspect-ratio: auto; min-height: 520px; padding: 32px; }
      .slide h1 { font-size: 44px; }
    }
  </style>
</head>
<body>
  <main class="deck">
    <section class="slide">
      <p class="label">Deck Template</p>
      <h1>One idea per slide.</h1>
      <p>Keep decks static inside Claude Design Web. Export or rebuild later in the target tool.</p>
    </section>
  </main>
</body>
</html>
