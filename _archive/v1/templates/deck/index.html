<!-- @template name="Deck" description="Native deck template: one idea per slide, token-backed, bundle-ready" -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deck</title>
  <script src="../ds-base.js"></script>
  <style>
    .deck-stage {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: var(--cds-space-8);
    }

    .slide {
      width: min(1120px, 100%);
      aspect-ratio: 16 / 9;
      border: 1px solid var(--cds-border);
      border-radius: var(--cds-radius-md);
      background: var(--cds-surface);
      padding: var(--cds-space-16);
      display: grid;
      align-content: center;
      box-shadow: var(--cds-elevation-md);
    }

    .slide h1 {
      font-family: var(--cds-font-display);
      font-size: clamp(44px, 8vw, 76px);
      line-height: 0.96;
      margin: 0;
      letter-spacing: 0;
    }

    .slide p {
      color: var(--cds-muted);
      font-size: var(--cds-font-size-xl);
      line-height: var(--cds-line-height-normal);
      max-width: 62ch;
    }

    @media (max-width: 760px) {
      .deck-stage {
        padding: var(--cds-space-4);
      }

      .slide {
        aspect-ratio: auto;
        min-height: 520px;
        padding: var(--cds-space-8);
      }
    }
  </style>
</head>
<body>
  <main class="deck-stage">
    <section class="slide">
      <p class="label">Native deck template</p>
      <h1>One idea per slide.</h1>
      <p>Use Claude Design's deck path when possible. Keep this template static and token-backed.</p>
    </section>
  </main>
</body>
</html>
