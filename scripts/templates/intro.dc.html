<!DOCTYPE html>
<html lang="{{INTRO_HTML_LANG}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{INTRO_PAGE_TITLE}}</title>
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  {{DS_HELMET_BLOCK}}
  <style>
    .cdp-ds{min-height:100vh;background:var(--background);color:var(--foreground);font-family:var(--font-sans);}
    .cdp-main{max-width:1180px;margin:0 auto;padding:72px clamp(18px,5vw,34px) 120px;display:flex;flex-direction:column;gap:84px;}
    .cdp-rail{position:fixed;left:18px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:8px;z-index:4;}
    .cdp-rail a{font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted-foreground);text-decoration:none;border:1px solid var(--hairline);background:var(--background);padding:8px 10px;max-width:180px;}
    .cdp-rail a:hover{color:var(--foreground);border-color:var(--hairline-strong);}
    .cdp-hero{display:flex;flex-direction:column;gap:22px;min-height:52vh;justify-content:center;border-bottom:1px solid var(--hairline);padding-bottom:64px;}
    .cdp-brandline{display:flex;align-items:center;gap:14px;font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--primary);}
    .cdp-kicker{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--primary);margin:0;}
    .cdp-hero h1{font-family:var(--font-display);font-weight:300;font-size:clamp(54px,9vw,118px);line-height:0.94;letter-spacing:0;margin:0;max-width:11ch;}
    .cdp-hero p{font-family:var(--font-serif);font-style:italic;font-size:var(--font-size-xl);line-height:1.45;color:var(--muted-foreground);max-width:62ch;margin:0;}
    .cdp-metrics{display:flex;flex-wrap:wrap;gap:20px 30px;margin-top:12px;}
    .cdp-section{display:flex;flex-direction:column;gap:34px;scroll-margin-top:30px;}
    .cdp-two{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:24px;}
    .cdp-three{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:24px;}
    .cdp-panel,.cdp-foundation-block,.cdp-component,.cdp-specimen,.cdp-surface,.cdp-prompt{border:1px solid var(--hairline);background:var(--card);border-radius:var(--radius-base);padding:24px;}
    .cdp-panel h3,.cdp-foundation-block h3,.cdp-component h3,.cdp-specimen h3,.cdp-surface h3,.cdp-prompt h3{font-family:var(--font-serif);font-weight:400;font-size:var(--font-size-xl);line-height:1.1;margin:0;color:var(--foreground);}
    .cdp-panel{display:flex;flex-direction:column;gap:20px;}
    .cdp-note{font-size:var(--font-size-base);line-height:1.6;color:var(--muted-foreground);max-width:74ch;margin:0;}
    .cdp-token-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:1px;background:var(--hairline);border:1px solid var(--hairline);}
    .cdp-token{display:flex;align-items:center;gap:12px;background:var(--background);padding:12px;}
    .cdp-token b,.cdp-token-list b{display:block;font-family:var(--font-mono);font-size:10px;letter-spacing:0.06em;color:var(--foreground);}
    .cdp-token small,.cdp-token-list small,.cdp-type-row small,.cdp-scale-row small{display:block;margin-top:3px;font-size:12px;color:var(--muted-foreground);word-break:break-word;}
    .cdp-swatch{width:42px;height:42px;border:1px solid var(--hairline-strong);flex:none;}
    .cdp-type-list{display:flex;flex-direction:column;border-top:1px solid var(--hairline);}
    .cdp-type-row{display:grid;grid-template-columns:160px minmax(0,1fr);gap:18px;align-items:baseline;border-bottom:1px solid var(--hairline);padding:16px 0;}
    .cdp-type-row>span:nth-child(2){font-size:var(--font-size-2xl);line-height:1.1;}
    .cdp-scale{display:flex;flex-direction:column;border-top:1px solid var(--hairline);margin-top:8px;}
    .cdp-scale-row{display:grid;grid-template-columns:150px 1fr 90px;gap:18px;align-items:center;border-bottom:1px solid var(--hairline);padding:14px 0;}
    .cdp-scale-row span{font-family:var(--font-mono);font-size:10px;color:var(--primary);}
    .cdp-token-list{display:flex;flex-direction:column;gap:10px;margin-top:18px;}
    .cdp-token-list span{border-top:1px solid var(--hairline);padding-top:10px;}
    .cdp-surface-grid,.cdp-specimen-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(220px,100%),1fr));gap:16px;}
    .cdp-surface{min-height:118px;display:flex;flex-direction:column;justify-content:space-between;}
    .cdp-component-group{display:flex;flex-direction:column;gap:18px;}
    .cdp-group-label{display:flex;align-items:center;gap:14px;font-family:var(--font-mono);font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--primary);}
    .cdp-group-label:after{content:"";height:1px;background:var(--hairline);flex:1;}
    .cdp-component-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(340px,100%),1fr));gap:20px;}
    .cdp-component{display:flex;flex-direction:column;gap:18px;min-height:300px;}
    .cdp-component-head{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;}
    .cdp-component-head code{font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground);max-width:180px;text-align:right;word-break:break-word;}
    .cdp-component p,.cdp-specimen p,.cdp-prompt p{font-size:var(--font-size-sm);line-height:1.55;color:var(--muted-foreground);margin:0;}
    .cdp-component-demo{margin-top:auto;border-top:1px solid var(--hairline);padding-top:18px;min-height:90px;display:flex;flex-direction:column;justify-content:center;}
    .cdp-row{display:flex;flex-wrap:wrap;align-items:center;gap:10px;color:var(--muted-foreground);font-size:var(--font-size-sm);}
    .cdp-stack{display:flex;flex-direction:column;gap:12px;}
    .cdp-book-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:18px;}
    .cdp-specimen dl{margin:18px 0 0;display:flex;flex-direction:column;gap:8px;}
    .cdp-specimen div{display:grid;grid-template-columns:80px 1fr;gap:10px;}
    .cdp-specimen dt{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;color:var(--primary);}
    .cdp-specimen dd{margin:0;font-size:12px;color:var(--muted-foreground);word-break:break-word;}
    .cdp-prompt-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(340px,100%),1fr));gap:18px;}
    .cdp-prompt{display:flex;flex-direction:column;gap:12px;}
    .cdp-prompt pre{position:relative;margin:0;padding:16px;border:1px solid var(--hairline);background:var(--background);overflow:auto;white-space:pre-wrap;}
    .cdp-prompt code{font-family:var(--font-mono);font-size:12px;line-height:1.55;color:var(--foreground);white-space:pre-wrap;}
    .cdp-prompt .md-copy{float:right;margin:0 0 10px 12px;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--hairline-strong);background:var(--card);color:var(--foreground);font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.08em;padding:6px 8px;border-radius:var(--radius-sm);}
    .cdp-prompt .md-copy.ok{color:var(--primary);}
    @media (prefers-reduced-motion: reduce){
      html.sc-dc-streaming .sc-placeholder::before,
      html.sc-dc-streaming .sc-interp.sc-missing::before,
      html.sc-dc-streaming::after{animation:none!important;}
      *,*::before,*::after{transition-duration:0.001ms!important;scroll-behavior:auto!important;}
    }
    @media (max-width:1180px){.cdp-rail{display:none;}.cdp-main{max-width:1040px;}}
    @media (max-width:820px){.cdp-two,.cdp-three{grid-template-columns:1fr;}.cdp-hero{min-height:auto;padding-top:28px;}.cdp-type-row,.cdp-scale-row{grid-template-columns:1fr;gap:8px;}.cdp-component-head{flex-direction:column;}.cdp-component-head code{text-align:left;max-width:none;}}
  </style>
</helmet>

{{INTRO_SYSTEM_HTML}}
</x-dc>
<!-- CDP:INTRO-SCRIPT -->
<!-- /CDP:INTRO-SCRIPT -->
</body>
</html>
